<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Georgia, serif">
  <rect width="800" height="400" fill="#0e0d0b"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#b8935a" font-size="11" letter-spacing="3" opacity="0.7">TIERED CONTEXT MANAGEMENT</text>

  <!-- Tier 1 — Recent Chapters -->
  <rect x="55" y="60" width="225" height="270" rx="2" fill="#b8935a" opacity="0.06" stroke="#b8935a" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="168" y="86" text-anchor="middle" fill="#b8935a" font-size="10" letter-spacing="2.5">TIER 1</text>
  <text x="168" y="110" text-anchor="middle" fill="#f5f1ea" font-size="18" font-style="italic">Recent Chapters</text>
  <text x="168" y="132" text-anchor="middle" fill="#f5f1ea" font-size="11" opacity="0.5">Full text, uncompressed</text>
  <!-- Simulated text lines -->
  <g opacity="0.25" stroke="#f5f1ea" stroke-width="1">
    <line x1="80" y1="160" x2="252" y2="160"/><line x1="80" y1="175" x2="238" y2="175"/>
    <line x1="80" y1="190" x2="248" y2="190"/><line x1="80" y1="205" x2="225" y2="205"/>
    <line x1="80" y1="220" x2="252" y2="220"/><line x1="80" y1="235" x2="210" y2="235"/>
    <line x1="80" y1="250" x2="245" y2="250"/><line x1="80" y1="265" x2="230" y2="265"/>
    <line x1="80" y1="280" x2="252" y2="280"/><line x1="80" y1="295" x2="218" y2="295"/>
  </g>
  <text x="168" y="340" text-anchor="middle" fill="#f5f1ea" font-size="10" opacity="0.3">Ch. 10–12</text>

  <!-- Tier 2 — Summaries -->
  <rect x="308" y="60" width="185" height="270" rx="2" fill="#b8935a" opacity="0.035" stroke="#b8935a" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="86" text-anchor="middle" fill="#b8935a" font-size="10" letter-spacing="2.5" opacity="0.7">TIER 2</text>
  <text x="400" y="110" text-anchor="middle" fill="#f5f1ea" font-size="18" font-style="italic" opacity="0.75">Summaries</text>
  <text x="400" y="132" text-anchor="middle" fill="#f5f1ea" font-size="11" opacity="0.35">Detailed, paragraph-length</text>
  <g opacity="0.15" stroke="#f5f1ea" stroke-width="1">
    <line x1="328" y1="165" x2="472" y2="165"/><line x1="328" y1="180" x2="455" y2="180"/>
    <line x1="328" y1="195" x2="465" y2="195"/>
    <line x1="328" y1="225" x2="472" y2="225"/><line x1="328" y1="240" x2="448" y2="240"/>
    <line x1="328" y1="255" x2="460" y2="255"/>
    <line x1="328" y1="285" x2="472" y2="285"/><line x1="328" y1="300" x2="450" y2="300"/>
  </g>
  <text x="400" y="340" text-anchor="middle" fill="#f5f1ea" font-size="10" opacity="0.2">Ch. 4–9</text>

  <!-- Tier 3 — Compressed -->
  <rect x="520" y="60" width="225" height="270" rx="2" fill="#b8935a" opacity="0.02" stroke="#b8935a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="632" y="86" text-anchor="middle" fill="#b8935a" font-size="10" letter-spacing="2.5" opacity="0.5">TIER 3</text>
  <text x="632" y="110" text-anchor="middle" fill="#f5f1ea" font-size="18" font-style="italic" opacity="0.5">Compressed</text>
  <text x="632" y="132" text-anchor="middle" fill="#f5f1ea" font-size="11" opacity="0.25">Essential facts only</text>
  <g opacity="0.09" stroke="#f5f1ea" stroke-width="1">
    <line x1="545" y1="170" x2="718" y2="170"/><line x1="545" y1="185" x2="695" y2="185"/>
    <line x1="545" y1="215" x2="710" y2="215"/><line x1="545" y1="245" x2="700" y2="245"/>
    <line x1="545" y1="275" x2="718" y2="275"/>
  </g>
  <text x="632" y="340" text-anchor="middle" fill="#f5f1ea" font-size="10" opacity="0.15">Ch. 1–3</text>

  <!-- Connecting dashes -->
  <line x1="282" y1="195" x2="306" y2="195" stroke="#b8935a" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="495" y1="195" x2="518" y2="195" stroke="#b8935a" stroke-width="0.8" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Resolution label -->
  <text x="400" y="380" text-anchor="middle" fill="#b8935a" font-size="10" letter-spacing="2" opacity="0.4" font-style="italic">&#8592; highest resolution · · · lowest resolution &#8594;</text>
</svg>