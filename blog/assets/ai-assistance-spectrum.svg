<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Georgia, serif">
  <rect width="800" height="300" fill="#0e0d0b"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#b8935a" font-size="11" letter-spacing="3" opacity="0.7">THE SPECTRUM OF AI ASSISTANCE</text>

  <!-- Spectrum line (hand-drawn style — slight wobble) -->
  <path d="M 70 72 Q 200 70, 400 72 Q 600 74, 730 72" fill="none" stroke="#b8935a" stroke-width="1.5" opacity="0.3"/>

  <!-- Zero AI -->
  <circle cx="80" cy="72" r="4" fill="#0e0d0b" stroke="#f5f1ea" stroke-width="0.8" opacity="0.3"/>
  <text x="80" y="55" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.3" letter-spacing="1.5">ZERO AI</text>

  <!-- Research -->
  <circle cx="210" cy="72" r="5" fill="#b8935a" opacity="0.2" stroke="#b8935a" stroke-width="0.8"/>
  <text x="210" y="98" text-anchor="middle" fill="#b8935a" font-size="13" font-style="italic" opacity="0.8">Research</text>
  <text x="210" y="114" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.35">Fact-checking, world</text>
  <text x="210" y="128" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.35">detail, background</text>

  <!-- Structure -->
  <circle cx="340" cy="72" r="5" fill="#b8935a" opacity="0.25" stroke="#b8935a" stroke-width="0.8"/>
  <text x="340" y="98" text-anchor="middle" fill="#b8935a" font-size="13" font-style="italic" opacity="0.85">Structure</text>
  <text x="340" y="114" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.35">Outlines, beat sheets,</text>
  <text x="340" y="128" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.35">character arcs</text>

  <!-- Voice-Matched Drafting (highlighted) -->
  <circle cx="480" cy="72" r="7" fill="#b8935a" opacity="0.3" stroke="#d4aa72" stroke-width="1.2"/>
  <text x="480" y="98" text-anchor="middle" fill="#d4aa72" font-size="14" font-style="italic">Voice-Matched</text>
  <text x="480" y="115" text-anchor="middle" fill="#d4aa72" font-size="14" font-style="italic">Drafting</text>
  <text x="480" y="134" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.45">AI writes in your voice,</text>
  <text x="480" y="148" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.45">you direct every chapter</text>

  <!-- Revision -->
  <circle cx="600" cy="72" r="5" fill="#b8935a" opacity="0.2" stroke="#b8935a" stroke-width="0.8"/>
  <text x="600" y="98" text-anchor="middle" fill="#b8935a" font-size="13" font-style="italic" opacity="0.7">Revision</text>
  <text x="600" y="114" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.3">Editorial AI review,</text>
  <text x="600" y="128" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.3">continuity checks</text>

  <!-- Full Auto -->
  <circle cx="720" cy="72" r="4" fill="#0e0d0b" stroke="#f5f1ea" stroke-width="0.8" opacity="0.2"/>
  <text x="720" y="55" text-anchor="middle" fill="#f5f1ea" font-size="9" opacity="0.2" letter-spacing="1.5">FULL AUTO</text>

  <!-- Meridian bracket -->
  <path d="M 190 162 L 190 170 L 620 170 L 620 162" fill="none" stroke="#b8935a" stroke-width="0.8" opacity="0.35" stroke-dasharray="4 3"/>
  <text x="405" y="190" text-anchor="middle" fill="#b8935a" font-size="10" letter-spacing="2" opacity="0.5">MERIDIAN'S RANGE</text>

  <!-- Arrows -->
  <text x="80" y="230" fill="#f5f1ea" font-size="10" opacity="0.2" font-style="italic">&#8592; more human control</text>
  <text x="720" y="230" text-anchor="end" fill="#f5f1ea" font-size="10" opacity="0.2" font-style="italic">more AI involvement &#8594;</text>

  <!-- Bottom note -->
  <text x="400" y="272" text-anchor="middle" fill="#f5f1ea" font-size="11" opacity="0.25" font-style="italic">The author makes the creative decisions at every point on this spectrum.</text>
</svg>